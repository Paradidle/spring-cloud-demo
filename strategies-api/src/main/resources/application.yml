spring:
  application:
    name: strategies-api
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      read-timeout: 30000
    chat:
      client:
        enabled: true
  datasource:
    url: jdbc:mysql://${DB_HOST}:13306/stock_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: 8083

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.strategiesapi.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl